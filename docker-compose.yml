version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: movie_review_db
    environment:
      POSTGRES_DB: movie_review_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yaska23
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: movie_review_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movie_review_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: yaska23
      JWT_SECRET: YasminMovieReviewPlatformSecretKey2024VeryLongSecretKeyForSecurity
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: